<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Tester Agent - Detective, magnifying glass, red theme -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#B71C1C;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="#F44336" stroke-width="3"/>
  <!-- Head -->
  <circle cx="100" cy="108" r="47" fill="#E8C4A0"/>
  <!-- Hair - neat, investigator -->
  <path d="M57 98 Q55 52 100 46 Q145 52 143 98 L138 86 Q130 58 100 52 Q70 58 62 86 Z" fill="#4E342E"/>
  <!-- Eyes - sharp, observant -->
  <ellipse cx="82" cy="106" rx="8" ry="9" fill="white"/>
  <ellipse cx="118" cy="106" rx="8" ry="9" fill="white"/>
  <circle cx="83" cy="106" r="5" fill="#B71C1C"/>
  <circle cx="119" cy="106" r="5" fill="#B71C1C"/>
  <circle cx="84" cy="104" r="2" fill="white"/>
  <circle cx="120" cy="104" r="2" fill="white"/>
  <!-- Narrowed eyebrows - scrutinizing -->
  <path d="M70 94 Q80 90 92 94" stroke="#3E2723" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M108 94 Q120 90 130 94" stroke="#3E2723" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Knowing smirk -->
  <path d="M84 128 Q96 136 112 130" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Magnifying glass -->
  <circle cx="155" cy="75" r="18" fill="none" stroke="#FFD700" stroke-width="4"/>
  <circle cx="155" cy="75" r="14" fill="rgba(255,255,255,0.1)"/>
  <line x1="142" y1="88" x2="128" y2="104" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
  <!-- Lab coat -->
  <path d="M55 168 Q55 148 80 140 L100 155 L120 140 Q145 148 145 168 L145 200 L55 200 Z" fill="#ECEFF1"/>
  <line x1="100" y1="152" x2="100" y2="200" stroke="#B0BEC5" stroke-width="2"/>
  <!-- Red pocket -->
  <rect x="108" y="168" width="16" height="12" rx="2" fill="#F44336"/>
</svg>

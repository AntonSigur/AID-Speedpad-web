<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- PM Agent - Organized, clipboard personality, green theme -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#2E7D32;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="#4CAF50" stroke-width="3"/>
  <!-- Head -->
  <circle cx="100" cy="105" r="48" fill="#D7A86E"/>
  <!-- Hair - short neat -->
  <path d="M56 92 Q56 55 100 50 Q144 55 144 92 L138 85 Q130 65 100 60 Q70 65 62 85 Z" fill="#212121"/>
  <!-- Glasses -->
  <rect x="66" y="96" width="28" height="22" rx="5" fill="none" stroke="#37474F" stroke-width="3"/>
  <rect x="106" y="96" width="28" height="22" rx="5" fill="none" stroke="#37474F" stroke-width="3"/>
  <line x1="94" y1="107" x2="106" y2="107" stroke="#37474F" stroke-width="2"/>
  <!-- Eyes behind glasses -->
  <circle cx="80" cy="107" r="4" fill="#2E7D32"/>
  <circle cx="120" cy="107" r="4" fill="#2E7D32"/>
  <circle cx="81" cy="106" r="1.5" fill="white"/>
  <circle cx="121" cy="106" r="1.5" fill="white"/>
  <!-- Slight smile -->
  <path d="M84 128 Q100 138 116 128" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Headset -->
  <path d="M52 100 Q50 70 100 65 Q150 70 148 100" stroke="#616161" stroke-width="4" fill="none"/>
  <rect x="44" y="95" width="12" height="18" rx="4" fill="#616161"/>
  <rect x="144" y="95" width="12" height="18" rx="4" fill="#616161"/>
  <!-- Shirt -->
  <path d="M58 165 Q58 148 82 142 L100 155 L118 142 Q142 148 142 165 L142 200 L58 200 Z" fill="#4CAF50"/>
  <line x1="100" y1="150" x2="100" y2="200" stroke="#388E3C" stroke-width="2"/>
  <!-- Pocket with pen -->
  <rect x="110" y="165" width="18" height="14" rx="2" fill="#388E3C"/>
  <line x1="118" y1="162" x2="118" y2="172" stroke="#FFD700" stroke-width="2"/>
</svg>

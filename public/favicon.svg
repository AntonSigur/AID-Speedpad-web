<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Simple ant icon for favicon - IT Ant ehf -->
  <circle cx="32" cy="14" r="8" fill="#2196F3"/>
  <ellipse cx="32" cy="32" rx="12" ry="10" fill="#2196F3"/>
  <ellipse cx="32" cy="52" rx="14" ry="10" fill="#2196F3"/>
  <!-- Antennae -->
  <line x1="26" y1="8" x2="16" y2="0" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="8" x2="48" y2="0" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs left -->
  <line x1="20" y1="28" x2="6" y2="20" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="34" x2="4" y2="34" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="20" y1="40" x2="6" y2="48" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs right -->
  <line x1="44" y1="28" x2="58" y2="20" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="34" x2="60" y2="34" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="44" y1="40" x2="58" y2="48" stroke="#64B5F6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="28" cy="12" r="2" fill="white"/>
  <circle cx="36" cy="12" r="2" fill="white"/>
</svg>
